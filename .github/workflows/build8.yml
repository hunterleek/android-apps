name: Build 8 - AGP 7.0

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Java 11
      uses: actions/setup-java@v4
      with: {java-version: '11', distribution: 'temurin'}
    - name: Build
      run: |
        for app in messaging calling gallery fileexplorer keyboard; do
          cd $app
          sed -i "s/8.2.0/7.0.2/g" build.gradle
          gradle wrapper --gradle-version 7.5
          ./gradlew assembleDebug && cd ..
        done
    - name: Upload
      uses: actions/upload-artifact@v4
      with: {name: apk8, path: '**/*.apk'}
