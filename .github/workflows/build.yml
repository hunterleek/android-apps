name: Build Android APKs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Create Gradle Wrapper
      run: |
        # Create gradle wrapper for each project
        for app in messaging calling gallery fileexplorer keyboard; do
          cd $app
          if [ ! -f gradlew ]; then
            echo "Creating gradle wrapper for $app"
            gradle wrapper --gradle-version 8.0 2>/dev/null || echo "Wrapper creation failed for $app"
          fi
          cd ..
        done
        
    - name: Build APKs
      run: |
        mkdir -p apks
        for app in messaging calling gallery fileexplorer keyboard; do
          echo "=== Building $app ==="
          cd $app
          
          # Try gradlew first, then gradle
          if [ -f gradlew ]; then
            chmod +x gradlew
            ./gradlew assembleDebug --no-daemon || echo "Build failed: $app"
          else
            gradle assembleDebug --no-daemon || echo "Build failed: $app"
          fi
          
          # Find and copy APKs
          apk_path=$(find app/build/outputs -name "*.apk" 2>/dev/null | head -1)
          if [ -n "$apk_path" ]; then
            cp "$apk_path" ../apks/
            echo "Copied: $apk_path"
          fi
          cd ..
        done
        echo "=== Build Complete ==="
        ls -la apks/ || echo "No APKs found"
        
    - name: Upload APKs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: android-apps-debug
        path: apks/*.apk
        retention-days: 30
