name: Build Android APKs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: mingc/android-build-box:latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Build All APKs
      run: |
        mkdir -p apks
        for app in messaging calling gallery fileexplorer keyboard; do
          echo "=== Building $app ==="
          cd $app
          gradle assembleDebug || echo "Failed: $app"
          find app/build/outputs -name "*.apk" -exec cp {} ../apks/ \; 2>/dev/null || true
          cd ..
        done
        ls -la apks/ || echo "No APKs found"
        
    - name: Upload APKs
      uses: actions/upload-artifact@v4
      with:
        name: android-apps-debug
        path: apks/*.apk
        retention-days: 30
