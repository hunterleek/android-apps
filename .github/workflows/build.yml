name: Build Android APKs

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Enable KVM
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm
        
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: 11076708
        build-tools-version: '34.0.0'
        platform-version: 'android-34'
        
    - name: Accept Licenses
      run: |
        mkdir -p $ANDROID_HOME/licenses
        echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_HOME/licenses/android-sdk-license
        echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" >> $ANDROID_HOME/licenses/android-sdk-license
        echo -e "\nd975f751698a77b662f1254ddbeed3901e976f5a" >> $ANDROID_HOME/licenses/android-sdk-license
        
    - name: Build APKs
      run: |
        mkdir -p apks
        for app in messaging calling gallery fileexplorer keyboard; do
          echo "=== Building $app ==="
          cd $app
          gradle assembleDebug --no-daemon --no-configuration-cache || exit 1
          find app/build/outputs/apk/debug -name "*.apk" -exec cp {} ../apks/ \;
          cd ..
        done
        ls -la apks/
        
    - name: Upload APKs
      uses: actions/upload-artifact@v4
      with:
        name: android-apps-debug
        path: apks/*.apk
        retention-days: 30
