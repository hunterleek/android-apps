name: Build Android APKs

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Build All APKs
      run: |
        mkdir -p apks
        
        for app in messaging calling gallery fileexplorer keyboard; do
          echo "=== Building $app ==="
          cd $app
          
          # Create local.properties
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          
          # Build with Gradle
          gradle assembleDebug --no-daemon --stacktrace 2>&1 || {
            echo "Build failed for $app"
            exit 1
          }
          
          # Copy APK
          cp app/build/outputs/apk/debug/*.apk ../apks/ 2>/dev/null || true
          cd ..
        done
        
        ls -la apks/
        
    - name: Upload APKs
      uses: actions/upload-artifact@v4
      with:
        name: android-apps
        path: apks/*.apk
        retention-days: 30
