name: Build APKs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: temurin
        
    - name: Build with Gradle Wrapper
      run: |
        for dir in messaging calling gallery fileexplorer keyboard; do
          cd $dir
          # Generate wrapper if missing
          if [ ! -f gradlew ]; then
            echo "Generating wrapper for $dir"
            echo '#!/bin/bash' > gradlew
            echo 'exec gradle "$@"' >> gradlew
            chmod +x gradlew
          fi
          # Build
          ./gradlew assembleDebug --no-daemon 2>&1 || echo "Failed: $dir"
          # Copy APK
          find . -name "*.apk" -path "*/debug/*" -exec cp {} ../ \; 2>/dev/null || true
          cd ..
        done
        mkdir -p apks
        mv *.apk apks/ 2>/dev/null || true
        ls -la apks/
        
    - name: Upload
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: apps
        path: apks/*.apk
