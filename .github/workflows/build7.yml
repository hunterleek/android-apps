name: Build 7 - SDK 30

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Java 11
      uses: actions/setup-java@v4
      with: {java-version: '11', distribution: 'temurin'}
    - name: Setup Android
      uses: android-actions/setup-android@v3
      with: {build-tools-version: '30.0.3', platform-version: 'android-30'}
    - name: Build
      run: |
        for app in messaging calling gallery fileexplorer keyboard; do
          cd $app && gradle assembleDebug --no-daemon && cd ..
        done
    - name: Upload
      uses: actions/upload-artifact@v4
      with: {name: apk7, path: '**/*.apk'}
