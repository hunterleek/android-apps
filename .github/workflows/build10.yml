name: Build 10 - Direct APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with: {java-version: '17', distribution: 'temurin'}
    - name: Setup Android
      uses: android-actions/setup-android@v3
    - name: Licenses
      run: yes | sdkmanager --licenses || true
    - name: Build Each
      run: |
        cd messaging && gradle assembleDebug || true
        cd ../calling && gradle assembleDebug || true
        cd ../gallery && gradle assembleDebug || true
        cd ../fileexplorer && gradle assembleDebug || true
        cd ../keyboard && gradle assembleDebug || true
    - name: Collect
      run: mkdir -p apks && find . -name "*.apk" -exec cp {} apks/ \;
    - name: Upload
      uses: actions/upload-artifact@v4
      with: {name: apk10, path: 'apks/*.apk'}
