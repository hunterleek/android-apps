name: Build 2 - Android SDK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Java
      uses: actions/setup-java@v4
      with: {java-version: '17', distribution: 'temurin'}
    - name: Setup Android
      uses: android-actions/setup-android@v3
    - name: Build
      run: |
        for app in messaging calling gallery fileexplorer keyboard; do
          cd $app && gradle assembleDebug --no-daemon && cd ..
        done
    - name: Upload
      uses: actions/upload-artifact@v4
      with: {name: apk2, path: '**/*.apk'}
