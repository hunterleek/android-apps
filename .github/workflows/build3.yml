name: Build 3 - Prebuilt Wrapper

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with: {java-version: '17', distribution: 'temurin'}
    - name: Download Gradle
      run: wget https://services.gradle.org/distributions/gradle-7.5-bin.zip && unzip -q gradle-7.5-bin.zip && export PATH=$PATH:$(pwd)/gradle-7.5/bin
    - name: Build
      run: |
        for app in messaging calling gallery fileexplorer keyboard; do
          cd $app && gradle wrapper && ./gradlew assembleDebug && cd ..
        done
    - name: Upload
      uses: actions/upload-artifact@v4
      with: {name: apk3, path: '**/*.apk'}
