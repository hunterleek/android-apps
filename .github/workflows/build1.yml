name: Build 1 - Standard Gradle

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with: {java-version: '17', distribution: 'temurin'}
    - name: Build
      run: |
        for app in messaging calling gallery fileexplorer keyboard; do
          cd $app && gradle wrapper --gradle-version 7.5 && ./gradlew assembleDebug && cd ..
        done
    - name: Upload
      uses: actions/upload-artifact@v4
      with: {name: apk1, path: '**/*.apk'}
