name: Build 6 - Manual Wrapper

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Java
      uses: actions/setup-java@v4
      with: {java-version: '17', distribution: 'temurin'}
    - name: Create Wrapper
      run: |
        for app in messaging calling gallery fileexplorer keyboard; do
          mkdir -p $app/gradle/wrapper
          wget -q https://services.gradle.org/distributions/gradle-7.5-bin.zip -O $app/gradle/wrapper/gradle-wrapper.jar
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-7.5-bin.zip" > $app/gradle/wrapper/gradle-wrapper.properties
        done
    - name: Build
      run: |
        for app in messaging calling gallery fileexplorer keyboard; do
          cd $app && echo '#!/bin/bash' > gradlew && echo 'exec java -jar gradle/wrapper/gradle-wrapper.jar "$@"' >> gradlew && chmod +x gradlew && ./gradlew assembleDebug && cd ..
        done
    - name: Upload
      uses: actions/upload-artifact@v4
      with: {name: apk6, path: '**/*.apk'}
