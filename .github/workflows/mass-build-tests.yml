name: Mass Build Tests

on:
  workflow_dispatch:

jobs:
  build-messaging-001:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - run: |
          mkdir -p apks
          cd messaging && ./gradlew clean assembleDebug --no-daemon --stacktrace
          cp app/build/outputs/apk/debug/*.apk ../apks/ || true
          ls -la ../apks/
      - uses: actions/upload-artifact@v4
        with:
          name: messaging-001
          path: apks/*.apk
          if-no-files-found: ignore
  build-calling-001:
