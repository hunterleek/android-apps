name: Build Android APKs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Build All APKs
      run: |
        mkdir -p apks
        for app in messaging calling gallery fileexplorer keyboard; do
          echo "=== Building $app ==="
          (cd $app && ./gradlew assembleDebug --no-daemon && cp app/build/outputs/apk/debug/*.apk ../apks/)
        done
        echo "=== APKs ==="
        ls -la apks/
        
    - name: Upload APKs
      uses: actions/upload-artifact@v4
      with:
        name: android-apps-debug
        path: apks/*.apk
        retention-days: 30
